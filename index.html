<!DOCTYPE html>
<html>
<head>
  <title>7B Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      /* 🖼️ background image */
      background-image: url("IMG_1388.jpeg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* dark overlay */
    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      color: #007bff;
      text-shadow: 0 0 15px #007bff;
      margin-top: 20px;
    }

    .subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    /* button grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: rgba(0,0,0,0.5);
      border: 1px solid #007bff;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,123,255,0.4);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #007bff;
    }

    .icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 16px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="overlay">

  <h1>📘 7B Class Hub</h1>
  <div class="subtitle">Your school dashboard</div>

  <div class="grid">

    <div class="card" onclick="location.href='timetable.html'">
      <div class="icon">📅</div>
      <div class="title">Timetable</div>
    </div>

    <div class="card" onclick="location.href='discord.html'">
      <div class="icon">💬</div>
      <div class="title">Discord</div>
    </div>

    <div class="card" onclick="location.href='about.html'">
      <div class="icon">ℹ️</div>
      <div class="title">About Us</div>
    </div>

    <div class="card" onclick="location.href='status.html'">
      <div class="icon">📢</div>
      <div class="title">Online Status</div>
    </div>

  </div>

</div>

</body>
</html>
