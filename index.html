<!DOCTYPE html>
<html>
<head>
  <title>7B Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;

      /* 🎨 BACKGROUND */
      background: url("IMG_1388.jpeg") no-repeat center center fixed;
      background-size: cover;
    }

    /* 🖤 TOP BAR */
    .topbar {
      background: rgba(0,0,0,0.85);
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }

    /* NAV */
    .nav {
      display: flex;
      gap: 12px;
    }

    /* ⚪ WHITE BUTTONS */
    .nav button {
      background: white;
      color: black;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .nav button:hover {
      transform: scale(1.08);
      background: #e6e6e6;
    }

    /* LOGO AREA */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-top: 50px;
      padding-left: 30px;
    }

    /* 📈 BIG LOGO */
    .logo-area img {
      width: 160px;
      height: 160px;
      border-radius: 25px;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }

    /* 📈 BIG TITLE */
    .title {
      font-size: 48px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 15px black;
    }

  </style>
</head>

<body>

<!-- 🖤 TOP BAR -->
<div class="topbar">

  <div class="nav">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='discord.html'">Discord</button>
    <button onclick="location.href='about.html'">About Us</button>
    <button onclick="location.href='timetable.html'">Timetable</button>
    <button onclick="location.href='status.html'">Online Status</button>
  </div>

</div>

<!-- 🖼️ LOGO + TITLE -->
<div class="logo-area">
  <img src="6A45FB73-2101-4900-80C9-940224C8B634.png" alt="logo">
  <div class="title">7B Website page</div>
</div>

</body>
</html>
