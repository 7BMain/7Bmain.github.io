<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    nav {
      background: rgba(0,0,0,0.3);
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #00ffc3;
    }

    .hero {
      padding: 100px 20px;
    }

    .btn {
      padding: 12px 20px;
      background: #00ffc3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="hero">
  <h1>Welcome to My Website 🚀</h1>
  <p>This is my custom site hosted for free</p>
  <button class="btn" onclick="alert('Welcome!')">Click Me</button>
</div>

</body>
</html>
