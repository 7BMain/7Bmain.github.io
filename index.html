<!DOCTYPE html>
<html>
<head>
  <title>7B Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2e6d9; /* light brown */
    }

    /* 🖤 TOP BAR */
    .topbar {
      background: black;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.5);
    }

    /* BUTTONS */
    .nav {
      display: flex;
      gap: 10px;
    }

    .nav button {
      background: #007bff;
      border: none;
      padding: 10px 14px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #007bff;
    }

    .nav button:hover {
      transform: scale(1.05);
      background: #0056b3;
    }

    /* LEFT SIDE LOGO AREA */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 30px;
      padding-left: 30px;
    }

    .logo-area img {
      width: 90px;
      height: 90px;
      border-radius: 20px; /* rounded square */
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #1a1a1a;
    }

  </style>
</head>

<body>

<!-- 🖤 TOP BAR -->
<div class="topbar">

  <div class="nav">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='discord.html'">Discord</button>
    <button onclick="location.href='about.html'">About Us</button>
    <button onclick="location.href='timetable.html'">Timetable</button>
    <button onclick="location.href='status.html'">Online Status</button>
  </div>

</div>

<!-- 🖼️ LOGO + TITLE -->
<div class="logo-area">
  <img src="6A45FB73-2101-4900-80C9-940224C8B634.png" alt="logo">
  <div class="title">7B Website page</div>
</div>

</body>
</html>
