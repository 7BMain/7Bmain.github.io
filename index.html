<!DOCTYPE html>
<html>
<head>
  <title>7B Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;

      /* 🎨 BACKGROUND IMAGE */
      background: url("YOUR_BACKGROUND.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    /* 🖤 BIG TOP BAR */
    .topbar {
      background: rgba(0,0,0,0.85);
      height: 100px; /* bigger bar */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }

    /* NAV BUTTONS */
    .nav {
      display: flex;
      gap: 12px;
    }

    .nav button {
      background: #007bff;
      border: none;
      padding: 12px 16px;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 12px #007bff;
      font-size: 14px;
    }

    .nav button:hover {
      transform: scale(1.08);
      background: #0056b3;
    }

    /* 🖼️ LOGO SECTION */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 40px;
      padding-left: 30px;
    }

    .logo-area img {
      width: 100px;
      height: 100px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 10px black;
    }

  </style>
</head>

<body>

<!-- 🖤 TOP BAR -->
<div class="topbar">

  <div class="nav">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='discord.html'">Discord</button>
    <button onclick="location.href='about.html'">About Us</button>
    <button onclick="location.href='timetable.html'">Timetable</button>
    <button onclick="location.href='status.html'">Online Status</button>
  </div>

</div>

<!-- 🖼️ LOGO -->
<div class="logo-area">
  <img src="6A45FB73-2101-4900-80C9-940224C8B634.png" alt="logo">
  <div class="title">7B Website page</div>
</div>

</body>
</html>
