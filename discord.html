<!DOCTYPE html>
<html>
<head>
  <title>Discord - 7B</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #c8a27a; /* light brown */
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px;
    }

    h1 {
      color: #007bff;
      text-shadow: 0 0 10px #007bff;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      max-width: 600px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 10px #007bff;
      transition: 0.3s;
    }

    .btn:hover {
      box-shadow: 0 0 20px #00bfff;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>7B Discord Server</h1>

    <div class="box">
      <p>Welcome to the official 7B Discord server.</p>
      <p>This server is used for school updates, communication, and gaming.</p>

      <a class="btn" href="https://discord.gg/yJ6M3htxWq" target="_blank">
        Join Discord
      </a>

      <br><br>

      <a class="btn" href="index.html">⬅ Back to Home</a>
    </div>

  </div>

</body>
</html>
